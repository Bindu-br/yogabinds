<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogaBinds | Back Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a3a2a;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
      user-select: none;
      -webkit-user-select: none;
    }

    .maintenance {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 60px;
      opacity: 0.9;
    }

    .logo span {
      color: #a8cdb5;
    }

    .leaf {
      font-size: 3rem;
      margin-bottom: 32px;
      display: block;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: #a8cdb5;
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      color: #a8cdb5;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 24px;
    }

    .line {
      width: 60px;
      height: 1px;
      background: #a8cdb5;
      margin: 40px auto 0;
      opacity: 0.4;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .logo {
        font-size: 1.4rem;
        margin-bottom: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="maintenance">
    <div class="logo">Yoga<span>Binds</span></div>
    <span class="leaf">&#127807;</span>
    <h1>Finding our <em>balance.</em><br>Back soon.</h1>
    <p class="subtitle">We're taking a mindful pause</p>
    <div class="line"></div>
  </div>
</body>
</html>
